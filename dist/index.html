<!-- ═══════════════════════════════════════════════════════
     WHITEBOARD VIEW — 白板绘制界面
══════════════════════════════════════════════════════════ -->
<div id="whiteboard-view" class="view hidden">

  <!-- ─── 顶部工具栏 ─── -->
  <header id="toolbar">

    <!-- 品牌 + 返回首页 -->
    <button class="toolbar-brand" id="btn-home" title="返回首页">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Anna</span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- 选择工具 -->
    <div class="tool-group" id="tool-group">
      <button class="tool-btn active" data-tool="select" title="选择 (V)">
        <svg viewBox="0 0 24 24"><path d="M4 2l16 10-7.5 1.5L9 21 4 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- 操作组 -->
    <div class="action-group">
      <button class="action-btn" id="btn-undo" title="撤销 (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24"><path d="M3 7h10a5 5 0 010 10H8" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><path d="M3 7l4-4M3 7l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="action-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)" disabled>
        <svg viewBox="0 0 24 24"><path d="M21 7H11a5 5 0 000 10h5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><path d="M21 7l-4-4M21 7l-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="action-btn danger" id="btn-delete" title="删除 (Del)" disabled>
        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="toolbar-spacer"></div>

    <!-- 缩放控制 -->
    <div class="zoom-group">
      <button class="icon-btn" id="btn-zoom-out" title="缩小 (-)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M8 11h6M20 20l-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="icon-btn" id="btn-zoom-in" title="放大 (+)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M11 8v6M8 11h6M20 20l-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" id="btn-zoom-fit" title="适应画布 (Ctrl+0)">
        <svg viewBox="0 0 24 24"><path d="M4 8V4h4M16 4h4v4M20 16v4h-4M8 20H4v-4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>

  </header>

  <!-- ─── 主体区域 ─── -->
  <main id="main">

    <!-- ─── 左侧形状面板（Outlook 风格三页签） ─── -->
    <nav id="shape-panel">
      <!-- 页签栏 -->
      <div id="shape-tabs">
        <button class="shape-tab active" data-cat="basic" title="基础形状">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <rect x="3" y="5" width="8" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
            <ellipse cx="17" cy="8.5" rx="4" ry="3.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
            <path d="M3 19l4-7 4 7H3z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
            <path d="M14 17l3-5 3 5h-6z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
          </svg>
          <span>形状</span>
        </button>
        <button class="shape-tab" data-cat="lines" title="线条">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M4 20L20 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="4" cy="20" r="2" fill="currentColor"/>
            <circle cx="20" cy="4" r="2" fill="currentColor"/>
            <path d="M3 13c3-2 6-3 9-1s5 3 9 1" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          </svg>
          <span>线条</span>
        </button>
        <button class="shape-tab" data-cat="arrows" title="箭头与更多">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M5 12h14M14 7l5 5-5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>箭头</span>
        </button>
      </div>

      <!-- 形状网格 -->
      <div id="shape-content">

        <!-- 基础形状 -->
        <div class="shape-category active" data-cat="basic">
          <div class="shape-grid">
            <button class="shape-item" data-tool="rectangle" title="矩形 (R)">
              <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
              <span>矩形</span>
            </button>
            <button class="shape-item" data-tool="ellipse" title="椭圆 (E)">
              <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="7" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
              <span>椭圆</span>
            </button>
            <button class="shape-item" data-tool="triangle" title="三角形 (T)">
              <svg viewBox="0 0 24 24"><path d="M12 3L22 20H2L12 3z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>三角</span>
            </button>
            <button class="shape-item" data-tool="diamond" title="菱形 (D)">
              <svg viewBox="0 0 24 24"><path d="M12 2L22 12L12 22L2 12L12 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>菱形</span>
            </button>
            <button class="shape-item" data-tool="parallelogram" title="平行四边形">
              <svg viewBox="0 0 24 24"><path d="M6 18L10 6h8L18 18H6z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>平行</span>
            </button>
            <button class="shape-item" data-tool="pentagram" title="五角星">
              <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>五角星</span>
            </button>
            <button class="shape-item" data-tool="roundedCallout" title="圆角气泡">
              <svg viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2H8l-4 4V17a2 2 0 01-1-2V5z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>气泡</span>
            </button>
            <button class="shape-item" data-tool="regularPentagonal" title="正五边形">
              <svg viewBox="0 0 24 24"><path d="M12 2l8.5 6.2-3.2 9.8H6.7L3.5 8.2 12 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>五边形</span>
            </button>
          </div>
        </div>

        <!-- 线条 -->
        <div class="shape-category" data-cat="lines">
          <div class="shape-grid" id="tool-group-lines">
            <button class="shape-item" data-tool="line" title="连接线 (L)">
              <svg viewBox="0 0 24 24"><path d="M5 19L19 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="5" cy="19" r="2.5" fill="currentColor"/><circle cx="19" cy="5" r="2.5" fill="currentColor"/></svg>
              <span>连线</span>
            </button>
            <button class="shape-item" data-tool="freeLine" title="自由画笔 (F)">
              <svg viewBox="0 0 24 24"><path d="M3 17c2-4 5-8 9-9 2-.5 4 .5 5 2s0 4-2 5c-3 1.5-6-1-4-4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
              <span>画笔</span>
            </button>
          </div>
        </div>

        <!-- 箭头 -->
        <div class="shape-category" data-cat="arrows">
          <div class="shape-grid" id="tool-group-arrows">
            <button class="shape-item" data-tool="rightArrow" title="右箭头">
              <svg viewBox="0 0 24 24"><path d="M4 10h12V7l4 5-4 5v-3H4v-4z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>右箭头</span>
            </button>
            <button class="shape-item" data-tool="bottomArrow" title="下箭头">
              <svg viewBox="0 0 24 24"><path d="M10 4v12H7l5 4 5-4h-3V4h-4z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              <span>下箭头</span>
            </button>
          </div>
        </div>

      </div><!-- /#shape-content -->
    </nav><!-- /#shape-panel -->

    <!-- 画布容器 -->
    <div id="canvas-wrapper">
      <div id="anna-canvas"></div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <p>正在初始化 Anna…</p>
      </div>
    </div>

    <!-- 右侧属性面板（选中形状时显示） -->
    <aside id="properties-panel" class="hidden">
      <h3>属性</h3>
      <div class="prop-group">
        <label>填充色</label>
        <div class="color-picker-row">
          <input type="color" id="prop-fill" value="#ffffff" />
          <input type="range" id="prop-alpha" min="0" max="100" value="100" title="透明度" />
          <span class="prop-val" id="alpha-val">100%</span>
        </div>
      </div>
      <div class="prop-group">
        <label>边框色</label>
        <input type="color" id="prop-border" value="#4f7bff" />
      </div>
      <div class="prop-group">
        <label>边框宽</label>
        <input type="range" id="prop-border-w" min="0" max="10" value="1" step="0.5" />
        <span class="prop-val" id="borderw-val">1</span>
      </div>
    </aside>

  </main>

  <!-- ─── 状态栏 ─── -->
  <footer id="statusbar">
    <span id="status-tool">工具: 选择</span>
    <span class="dot">·</span>
    <span id="status-shapes">0 个形状</span>
    <span class="dot">·</span>
    <span id="status-selected">未选中</span>
  </footer>

</div><!-- /#whiteboard-view -->

</body>
